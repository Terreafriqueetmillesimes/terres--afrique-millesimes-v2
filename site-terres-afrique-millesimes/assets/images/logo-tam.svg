<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 140" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Terres d'Afrique et Millésimes">
  <title>Terres d'Afrique &amp; Millésimes</title>
  <defs>
    <linearGradient id="tamGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF0D0"/>
      <stop offset="40%" stop-color="#E6C66B"/>
      <stop offset="72%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8F7228"/>
    </linearGradient>
    <linearGradient id="tamGoldHoriz" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- TOP ORNAMENT : fines lignes or + diamant central -->
  <g>
    <line x1="20" y1="20" x2="124" y2="20" stroke="url(#tamGoldHoriz)" stroke-width="0.6"/>
    <line x1="136" y1="20" x2="240" y2="20" stroke="url(#tamGoldHoriz)" stroke-width="0.6"/>
    <path d="M 130 14 L 134.5 20 L 130 26 L 125.5 20 Z" fill="url(#tamGold)"/>
  </g>

  <!-- MONOGRAMME T·A·M : T et M italiques en serif, A central en majuscule monumentale -->
  <g fill="url(#tamGold)" font-family="'Cormorant Garamond', 'EB Garamond', 'Trajan Pro', Georgia, 'Times New Roman', serif">
    <text x="62" y="90" font-size="62" font-style="italic" font-weight="500">T</text>
    <text x="130" y="94" text-anchor="middle" font-size="80" font-weight="500" letter-spacing="-1">A</text>
    <text x="198" y="90" text-anchor="end" font-size="62" font-style="italic" font-weight="500">M</text>
  </g>

  <!-- Petits points or de part et d'autre du A : sépare visuellement T·A·M -->
  <g fill="#C9A84C">
    <circle cx="98" cy="78" r="1.3"/>
    <circle cx="162" cy="78" r="1.3"/>
  </g>

  <!-- DIVIDER inférieur avec diamant -->
  <g>
    <line x1="20" y1="108" x2="124" y2="108" stroke="url(#tamGoldHoriz)" stroke-width="0.6"/>
    <line x1="136" y1="108" x2="240" y2="108" stroke="url(#tamGoldHoriz)" stroke-width="0.6"/>
    <path d="M 130 102 L 134.5 108 L 130 114 L 125.5 108 Z" fill="url(#tamGold)"/>
  </g>

  <!-- WORDMARK : Terres d'Afrique & Millésimes -->
  <text x="130" y="125" text-anchor="middle"
        font-family="'Marcellus SC', Georgia, 'Times New Roman', serif"
        font-size="9.5" letter-spacing="3.4" fill="#C9A84C">TERRES D'AFRIQUE &amp; MILLÉSIMES</text>

  <!-- Maison · 2016 -->
  <text x="130" y="137" text-anchor="middle"
        font-family="Georgia, serif" font-style="italic"
        font-size="6.5" letter-spacing="4.2" fill="#9c7e2e">MAISON · 2016</text>
</svg>
